spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/toluja}
    username: ${SPRING_DATASOURCE_USERNAME:toluja}
    password: ${SPRING_DATASOURCE_PASSWORD:toluja}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: 01234567890123456789012345678901
    expiration-ms: 86400000
  images:
    base-dir: ${APP_IMAGES_BASE_DIR:${user.dir}/data/images}
    item:
      width: ${APP_IMAGES_ITEM_WIDTH:400}
      height: ${APP_IMAGES_ITEM_HEIGHT:300}
      quality: ${APP_IMAGES_ITEM_QUALITY:0.8}
    webp:
      cwebp-bin: ${APP_IMAGES_WEBP_CWEBP_BIN:cwebp}

printers:
  mode: ${PRINTERS_MODE:agent}
  printer1: ${PRINTERS_PRINTER1:IMPRESSORA1}
  printer2: ${PRINTERS_PRINTER2:IMPRESSORA2}
  printer3: ${PRINTERS_PRINTER3:IMPRESSORA3}
  agent:
    store-id: ${PRINTERS_AGENT_STORE_ID:store-001}
    device-id: ${PRINTERS_AGENT_DEVICE_ID:agent-store-001}
  connect-timeout-ms: ${PRINTERS_CONNECT_TIMEOUT_MS:3000}
  cups-timeout-ms: ${PRINTERS_CUPS_TIMEOUT_MS:5000}
