spring:
  datasource:
    url: jdbc:sqlite:./data/pedido.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: 01234567890123456789012345678901
    expiration-ms: 86400000

printers:
  printer1: tcp://192.168.0.101:9100
  printer2: tcp://192.168.0.102:9100
