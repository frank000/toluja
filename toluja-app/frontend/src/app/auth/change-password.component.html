<div class="row justify-content-center mt-5">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="card shadow-sm border-warning">
      <div class="card-body p-4">
        <h4 class="mb-2">Trocar Senha</h4>
        <p class="text-muted mb-3">Por segurança, troque sua senha para continuar usando o sistema.</p>

        <form [formGroup]="form" (ngSubmit)="submit()" class="d-grid gap-3">
          <div>
            <label class="form-label">Senha atual</label>
            <input class="form-control" type="password" formControlName="senhaAtual" />
          </div>
          <div>
            <label class="form-label">Nova senha</label>
            <input class="form-control" type="password" formControlName="novaSenha" />
            <small class="text-muted" *ngIf="form.controls.novaSenha.touched && form.controls.novaSenha.invalid">
              Use pelo menos 6 caracteres.
            </small>
          </div>
          <div>
            <label class="form-label">Confirmar nova senha</label>
            <input class="form-control" type="password" formControlName="confirmarSenha" />
          </div>

          <button class="btn btn-warning" type="submit" [disabled]="loading">
            {{ loading ? 'Salvando...' : 'Atualizar senha' }}
          </button>
        </form>

        <div class="alert alert-danger mt-3 mb-0" *ngIf="erro">{{ erro }}</div>
      </div>
    </div>
  </div>
</div>
