<div class="card shadow-sm">
  <div class="card-body">
    <h5 class="card-title mb-3">Lista de Pedidos</h5>
    <div class="table-responsive">
      <table class="table table-striped align-middle">
        <thead>
          <tr>
            <th>Senha</th>
            <th>Código</th>
            <th>Data</th>
            <th class="text-end">Total</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let pedido of pedidos">
            <td><strong>{{ pedido.senhaChamada | number:'2.0-0' }}</strong></td>
            <td><strong>{{ pedido.codigo }}</strong></td>
            <td>{{ pedido.criadoEm | date:'short' }}</td>
            <td class="text-end">R$ {{ pedido.total | number:'1.2-2' }}</td>
            <td><span class="badge text-bg-secondary">{{ pedido.status }}</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
