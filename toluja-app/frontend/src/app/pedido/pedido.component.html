<div class="row g-4">
  <div class="col-12 col-lg-8">
    <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-3">
      <div class="col" *ngFor="let item of itens">
        <div class="card h-100 shadow-sm cursor-pointer" (click)="adicionar(item)">
          <div class="card-body d-flex flex-column justify-content-between">
            <h6 class="card-title mb-2">{{ item.nome }}</h6>
            <p class="text-primary fw-semibold mb-0">R$ {{ item.preco | number:'1.2-2' }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-12 col-lg-4">
    <div class="card shadow-sm sticky-top" style="top: 1rem;">
      <div class="card-body">
        <h5 class="card-title">Carrinho</h5>

        <div *ngFor="let entry of carrinhoEntries" class="border rounded p-2 mb-2">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <strong>{{ entry.item.nome }}</strong>
            <button class="btn btn-sm btn-outline-danger" (click)="remover(entry.item.id)">Remover</button>
          </div>
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-sm btn-outline-secondary" (click)="diminuir(entry.item.id)">-</button>
            <span>{{ entry.quantidade }}</span>
            <button class="btn btn-sm btn-outline-secondary" (click)="aumentar(entry.item.id)">+</button>
            <span class="ms-auto">R$ {{ (entry.item.preco * entry.quantidade) | number:'1.2-2' }}</span>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Observação</label>
          <textarea class="form-control" rows="2" [(ngModel)]="observacao"></textarea>
        </div>

        <p class="fs-5">Total: <strong>R$ {{ total | number:'1.2-2' }}</strong></p>
        <button class="btn btn-success w-100" (click)="enviarPedido()">Enviar pedido</button>

        <div class="alert alert-success mt-3 mb-0" *ngIf="mensagemSucesso">{{ mensagemSucesso }}</div>
        <div class="alert alert-danger mt-3 mb-0" *ngIf="erro">{{ erro }}</div>
      </div>
    </div>
  </div>
</div>
